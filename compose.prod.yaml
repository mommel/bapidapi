services:
  app:
    build:
      context: .
      target: prod
    container_name: bapidapi-app
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - bapidapi-prod-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: prod
    container_name: bapidapi-worker
    restart: unless-stopped
    command: ["supervisord", "-c", "/etc/supervisor/supervisord.conf"]
    env_file:
      - .env
    volumes:
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/supervisord.conf:ro
    networks:
      - bapidapi-prod-net

  nginx:
    image: nginx:1.27-alpine
    container_name: bapidapi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bapidapi-prod-net
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: bapidapi-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bapidapi}
      POSTGRES_USER: ${DB_USERNAME:-bapidapi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - bapidapi-prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bapidapi} -d ${DB_DATABASE:-bapidapi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bapidapi-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - bapidapi-prod-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: bapidapi-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - bapidapi-prod-net

networks:
  bapidapi-prod-net:
    driver: bridge

volumes:
  db-data:
  redis-data:
  minio-data:
