name: Security Audit

on:
  #push:
  #  branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 17 * * 3'  # Every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  composer-audit:
    name: Composer Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run composer audit
        run: composer audit --format=table

  laravel-security:
    name: Laravel Security Analysis
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bapidapi_test
          POSTGRES_USER: bapidapi
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Verify production configuration
        env:
          APP_ENV: production
          APP_DEBUG: false
        run: |
          php -r "require 'vendor/autoload.php'; \$app = require 'bootstrap/app.php'; \$app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap(); exit((config('app.env') === 'production' && config('app.debug') === false) ? 0 : 1);"

      - name: Detect Enlightn command
        id: enlightn
        run: |
          if php artisan list --raw | grep -qx 'enlightn'; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Enlightn is not available for the current dependency set. Skipping the scan."
          fi

      - name: Prepare database for Enlightn
        if: steps.enlightn.outputs.available == 'true'
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: bapidapi_test
          DB_USERNAME: bapidapi
          DB_PASSWORD: secret
        run: php artisan migrate --force

      - name: Run Enlightn Security Check
        if: steps.enlightn.outputs.available == 'true'
        env:
          APP_ENV: production
          APP_DEBUG: false
        run: php artisan enlightn --ci --no-failed

  trivy-scan:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build production Docker image
        run: docker build --target prod -t bapidapi:ci .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bapidapi:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
